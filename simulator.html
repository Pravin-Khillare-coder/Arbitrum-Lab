</head>
<body>

    <div class="logo" style="display:flex;">
    <img src="images/logo_color.svg" alt="logo">
    <h1>Web3 Explorer</h1>
</div>

        <a href="index.html">Home</a>

<!-- ✅ MAIN CONTENT -->
<div class="container">
    <h1>Blockchain Simulator</h1>

    <div class="grid">
        <div class="card">
            <h2>Block 1</h2>
            <input id="data1" placeholder="Block 1 Data">
            <button onclick="mineBlock1()">Mine</button>
            <p>Nonce: <span id="nonce1"></span></p>
            <p>Hash: <span id="hash1"></span></p>
        </div>

        <div class="card">
            <h2>Block 2</h2>
            <input id="data2" placeholder="Block 2 Data">
            <button onclick="mineBlock2()">Mine</button>
            <p>Prev Hash: <span id="prevHash"></span></p>
            <p>Hash: <span id="hash2"></span></p>
            <p id="status2"></p>
        </div>
    </div>
</div>

<!-- ✅ JS LINK -->
<script src="js/simulator.js"></script>
